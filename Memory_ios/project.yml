name: Memory
options:
  bundleIdPrefix: com.tyndall
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  Memory:
    type: application
    platform: iOS
    sources:
      - path: Memory
        excludes:
          - "**/.DS_Store"
      - path: Shared
    resources:
      - path: Memory/Resources
      - path: Memory/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tyndall.memory
        INFOPLIST_FILE: Memory/Info.plist
        CODE_SIGN_ENTITLEMENTS: Memory/Memory.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_EMIT_LOC_STRINGS: true
    entitlements:
      path: Memory/Memory.entitlements
    info:
      path: Memory/Info.plist
      properties:
        CFBundleDisplayName: Memory
        CFBundleName: Memory
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: Memory needs microphone access to record voice memories and voice samples for voice cloning.
        NSCameraUsageDescription: Memory needs camera access to record video memories.
        NSPhotoLibraryUsageDescription: Memory needs photo library access to import photos for your memories.
        NSContactsUsageDescription: Memory needs contacts access to import your contacts for leaving messages to loved ones.
        NSLocationWhenInUseUsageDescription: Memory needs location access to enable location-based time capsule unlocking.
        NSFaceIDUsageDescription: Memory uses Face ID to protect your private memories and messages.
        NSSpeechRecognitionUsageDescription: Memory uses speech recognition to transcribe your voice memories into text.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - target: MemoryWidgets
        embed: true

  MemoryWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: MemoryWidgets
        excludes:
          - "**/.DS_Store"
          - Resources
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tyndall.memory.widgets
        CODE_SIGN_ENTITLEMENTS: MemoryWidgets/MemoryWidgets.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: MemoryWidgets
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        SKIP_INSTALL: true
        SWIFT_EMIT_LOC_STRINGS: true

  MemoryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MemoryTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tyndall.memory.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Memory.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Memory"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Memory

schemes:
  Memory:
    build:
      targets:
        Memory: all
        MemoryWidgets: all
        MemoryTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MemoryTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
